<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kế hoạch sản xuất | TDB</title>
    <!-- Thư viện xử lý Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- html2canvas để xuất ảnh -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Font Awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            user-select: none;
        }
        body {
            background: #0c0c14;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #e0e0e0;
            padding: 0;
        }
        .app {
            width: 100%;
            height: 100vh;
            background: #161822;
            border-radius: 0;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: none;
        }
        /* header */
        .app-header {
            padding: 12px 24px;
            background: #10121c;
            border-bottom: 1px solid #2f334c;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .logo h2 {
            font-weight: 400;
            color: #b9bbd4;
            font-size: 1.3rem;
        }
        .logo span {
            color: #6d8eff;
            font-weight: 600;
            margin-left: 6px;
        }
        .upload-area {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .file-input {
            position: relative;
            background: #262a40;
            border-radius: 40px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #454c73;
            cursor: pointer;
            transition: 0.2s;
            overflow: hidden;
        }
        .file-input input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            font-size: 0;
        }
        .file-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #c5c8e7;
            white-space: nowrap;
        }
        .badge {
            background: #32385a;
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 0.9rem;
            color: #b9c2ff;
            border: 1px solid #5f68a0;
        }
        /* thanh công cụ */
        .toolbar {
            padding: 12px 24px;
            background: #121422;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid #2f334c;
        }
        .tool-btn {
            background: #262b44;
            border: none;
            color: #d7daff;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #4a5080;
        }
        .tool-btn:hover {
            background: #333a60;
            border-color: #7c85ff;
            color: white;
        }
        .tool-btn i {
            font-size: 1rem;
            color: #8d9aff;
        }
        .ot-control {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
        }
        .ot-control select {
            background: #262b44;
            color: white;
            border-radius: 30px;
            padding: 8px 16px;
            border: 1px solid #51579c;
            outline: none;
        }
        /* khu vực chính */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            background: #0f111c;
        }
        /* panel danh sách công việc (WO) */
        .wo-panel {
            width: 320px;
            background: #141725;
            border-right: 1px solid #2d3150;
            padding: 16px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .wo-panel h3 {
            font-weight: 400;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8f94bb;
            margin-bottom: 16px;
        }
        .wo-item {
            background: #212536;
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-left: 6px solid;
            box-shadow: 0 5px 0 #0e111c;
            cursor: grab;
            transition: 0.1s;
            border: 1px solid #41476e;
            color: #eaeefb;
            position: relative;
        }
        .wo-item:active {
            cursor: grabbing;
            opacity: 0.8;
        }
        .wo-item.placed {
            opacity: 0.4;
            background: #2e3253;
            border-left-color: #6d6d6d !important;
            filter: grayscale(0.7);
            pointer-events: none;
        }
        .wo-item .wo-code {
            font-weight: 700;
            font-size: 1rem;
        }
        .wo-item .wo-detail {
            font-size: 0.8rem;
            color: #b2bbf0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 4px;
        }
        .wo-item .wo-giao {
            font-size: 0.75rem;
            color: #ffd966;
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
        }
        .wo-item .wo-ghichu {
            color: #b2b2ff;
        }
        /* timeline container */
        .timeline-wrapper {
            flex: 1;
            overflow-x: auto;
            overflow-y: auto;
            position: relative;
            background: #0a0b14;
        }
        .timeline-grid {
            display: flex;
            flex-direction: column;
            min-width: max-content;
        }
        /* header ngày - mỗi ngày chia thành các shift */
        .days-header {
            display: flex;
            background: #1b1e30;
            border-bottom: 2px solid #3a3f6b;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .machine-label-header {
            width: 70px;
            flex-shrink: 0;
            background: #1b1e30;
            border-right: 2px solid #4f5485;
        }
        .day-shift-group {
            display: flex;
            height: 100%;
        }
        .shift-header {
            text-align: center;
            padding: 8px 0;
            font-weight: 600;
            background: #1b1e30;
            border-right: 1px solid #3e4570;
            color: #cfd6ff;
        }
        .shift-header .date {
            font-size: 0.9rem;
        }
        .shift-header .shift-label {
            font-size: 0.7rem;
            color: #9da4e0;
        }
        /* các hàng máy */
        .machine-row {
            display: flex;
            height: 100px;
            border-bottom: 1px solid #2d3257;
            position: relative;
        }
        .machine-label {
            width: 70px;
            background: #181c2b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #c3c9ff;
            border-right: 2px solid #4f5485;
            flex-shrink: 0;
            font-size: 1.1rem;
        }
        .machine-timeline {
            flex: 1;
            display: flex;
            position: relative;
            background: #0f1221;
            height: 100%;
        }
        .time-slot {
            height: 100%;
            border-right: 1px dashed #3b416b;
            flex-shrink: 0;
            position: relative;
            background: rgba(255,255,255,0.01);
        }
        .time-slot.morning {
            background: rgba(90, 120, 255, 0.05);
        }
        .time-slot.afternoon {
            background: rgba(255, 190, 90, 0.05);
        }
        .time-slot.ot {
            background: rgba(200, 120, 255, 0.07);
        }
        /* job bar */
        .job-bar {
            position: absolute;
            height: 70px;
            top: 15px;
            background: #5f6eb0;
            border-radius: 12px;
            border: 2px solid #98a2ff;
            box-shadow: 0 6px 0 #2d325a;
            color: white;
            font-size: 0.8rem;
            padding: 6px 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: move;
            z-index: 20;
            transition: box-shadow 0.1s;
            min-width: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            pointer-events: auto;
        }
        .job-bar.selected {
            box-shadow: 0 0 0 3px #ffd966;
            z-index: 100;
        }
        .job-bar .job-size {
            font-weight: bold;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .job-bar .job-qty {
            font-size: 0.7rem;
            opacity: 0.9;
            white-space: nowrap;
        }
        .resize-handle {
            position: absolute;
            top: 0;
            right: 0;
            width: 12px;
            height: 100%;
            background: rgba(255,255,255,0.2);
            cursor: ew-resize;
            border-radius: 0 12px 12px 0;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="app-header">
        <div class="logo">
            <h2>📅 Lập lịch sản xuất <span>TDB</span></h2>
        </div>
        <div class="upload-area">
            <div class="file-input" id="file1Input">
                <i class="fas fa-file-excel"></i>
                <span class="file-label">1. KHSX 2026</span>
                <input type="file" id="khsxFile" accept=".xlsm,.xlsx">
            </div>
            <div class="file-input" id="file2Input">
                <i class="fas fa-file-excel"></i>
                <span class="file-label">2. Nhật ký TDB</span>
                <input type="file" id="nhatkyFile" accept=".xlsm,.xlsx">
            </div>
            <div class="badge" id="fileStatus">⬆️ Chưa tải file</div>
        </div>
    </div>
    <div class="toolbar">
        <button class="tool-btn" id="addDayBtn"><i class="fas fa-plus-circle"></i> Thêm ngày</button>
        <button class="tool-btn" id="removeDayBtn"><i class="fas fa-minus-circle"></i> Bớt ngày</button>
        <div class="ot-control">
            <button class="tool-btn" id="addOtBtn"><i class="fas fa-clock"></i> Thêm tăng ca</button>
            <button class="tool-btn" id="removeOtBtn"><i class="fas fa-clock"></i> Bỏ tăng ca</button>
            <select id="otDaySelect" style="background:#262b44; color:white; border-radius:30px; padding:8px; border:1px solid #51579c;"></select>
        </div>
        <button class="tool-btn" id="cutBtn"><i class="fas fa-cut"></i> Chia hai</button>
        <button class="tool-btn" id="deleteBtn"><i class="fas fa-trash"></i> Xóa</button>
        <button class="tool-btn" id="exportImgBtn"><i class="fas fa-camera"></i> Xuất JPG</button>
    </div>
    <div class="workspace" id="workspace">
        <div class="wo-panel" id="woPanel">
            <h3>📦 Đơn hàng đang chờ </h3>
            <div id="woList"></div>
        </div>
        <div class="timeline-wrapper" id="timelineWrapper">
            <div class="timeline-grid" id="timelineGrid"></div>
        </div>
    </div>
</div>
<script>
    (function() {
        // ---------- DỮ LIỆU ----------
        let woData = [];               
        let productivityData = {};     
        let machines = Array.from({ length: 8 }, (_, i) => `Máy ${String(i+1).padStart(2,'0')}`);
        let jobs = [];                 
        let totalDays = 3;              
        let pxPerHour = 35;             
        let startDate = new Date();      
        startDate.setHours(0,0,0,0);
        let otDays = new Set();          
        let selectedJobId = null;        
        let dragState = null; // cho di chuyển/resize job

        // DOM elements
        const khsxInput = document.getElementById('khsxFile');
        const nhatkyInput = document.getElementById('nhatkyFile');
        const fileStatus = document.getElementById('fileStatus');
        const woListDiv = document.getElementById('woList');
        const timelineGrid = document.getElementById('timelineGrid');
        const addDayBtn = document.getElementById('addDayBtn');
        const removeDayBtn = document.getElementById('removeDayBtn');
        const addOtBtn = document.getElementById('addOtBtn');
        const removeOtBtn = document.getElementById('removeOtBtn');
        const otDaySelect = document.getElementById('otDaySelect');
        const cutBtn = document.getElementById('cutBtn');
        const deleteBtn = document.getElementById('deleteBtn');
        const exportImgBtn = document.getElementById('exportImgBtn');

        // ---------- HÀM ĐỌC EXCEL VỚI PHẢN HỒI ----------
        async function readExcelFile(file, type) {
            try {
                const data = await file.arrayBuffer();
                const workbook = XLSX.read(data, { type: 'array' });
                if (type === 'khsx') {
                    const sheet = workbook.Sheets['KHSX'];
                    if (!sheet) { alert('Không tìm thấy sheet KHSX'); return; }
                    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                    woData = [];
                    for (let i = 8; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row[0] || row[0].toString().trim() === '') continue;
                        // Giả sử cột I là ngày giao (dạng số excel), cột J là ghi chú
                        let ngayGiaoExcel = row[8];
                        let ngayGiao = null;
                        if (typeof ngayGiaoExcel === 'number') {
                            ngayGiao = new Date((ngayGiaoExcel - 25569) * 86400 * 1000);
                        } else {
                            // Tạo ngày giả để demo
                            let fakeDate = new Date(startDate);
                            fakeDate.setDate(startDate.getDate() + Math.floor(Math.random() * 10) + 1);
                            ngayGiao = fakeDate;
                        }
                        let ghiChu = row[9] ? row[9].toString().trim() : '';
                        const wo = {
                            woCode: row[0]?.toString().trim() || '',
                            khachHang: row[3]?.toString().trim() || '',
                            tenSp: row[5]?.toString().trim() || '',
                            kichThuoc: row[6]?.toString().trim() || '',
                            soLuong: parseFloat(row[7]) || 0,
                            donVi: row[5]?.toString().trim() || '',
                            ngayGiao: ngayGiao,
                            ghiChu: ghiChu,
                            id: 'wo_' + Math.random().toString(36).substr(2, 8),
                            placed: false,
                        };
                        woData.push(wo);
                    }
                    // Sắp xếp: ưu tiên ghi chú chứa "kết hợp" hoặc "xong giao" (không dấu), sau đó ngày giao gần nhất
                    woData.sort((a, b) => {
                        let aPriority = (a.ghiChu.toLowerCase().includes('kết hợp') || a.ghiChu.toLowerCase().includes('xong giao')) ? 0 : 1;
                        let bPriority = (b.ghiChu.toLowerCase().includes('kết hợp') || b.ghiChu.toLowerCase().includes('xong giao')) ? 0 : 1;
                        if (aPriority !== bPriority) return aPriority - bPriority;
                        // nếu cùng priority, so sánh ngày giao
                        if (a.ngayGiao && b.ngayGiao) return a.ngayGiao - b.ngayGiao;
                        if (a.ngayGiao) return -1;
                        if (b.ngayGiao) return 1;
                        return 0;
                    });
                    fileStatus.innerText = `✅ Đã đọc KHSX: ${woData.length} WO`;
                } else if (type === 'nhatky') {
                    const sheet = workbook.Sheets['NHATKY_SX'];
                    if (!sheet) { alert('Không tìm thấy sheet NHATKY_SX'); return; }
                    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                    let prodMap = {};
                    for (let i = 2; i < rows.length; i++) {
                        const r = rows[i];
                        if (!r[1]) continue;
                        const tenSp = r[1]?.toString().trim();
                        const sanLuong = parseFloat(r[8]) || 0;
                        const startTime = r[9]; 
                        const endTime = r[10];
                        let startDateObj = (typeof startTime === 'number') ? new Date((startTime - 25569)*86400*1000) : new Date();
                        let endDateObj = (typeof endTime === 'number') ? new Date((endTime - 25569)*86400*1000) : new Date();
                        let hours = (endDateObj - startDateObj) / (1000*3600);
                        if (hours <= 0) continue;
                        if (!prodMap[tenSp] || prodMap[tenSp].sanLuong < sanLuong) {
                            prodMap[tenSp] = { sanLuong, hours };
                        }
                    }
                    productivityData = {};
                    for (let sp in prodMap) {
                        let p = prodMap[sp];
                        productivityData[sp] = p.hours / p.sanLuong; 
                    }
                    fileStatus.innerText += ' | 📊 Đã đọc Nhật ký';
                }
                renderWOList();
            } catch (error) {
                alert('Lỗi đọc file: ' + error.message);
            }
        }

        khsxInput.addEventListener('change', (e) => {
            if (e.target.files[0]) readExcelFile(e.target.files[0], 'khsx');
        });
        nhatkyInput.addEventListener('change', (e) => {
            if (e.target.files[0]) readExcelFile(e.target.files[0], 'nhatky');
        });

        function renderWOList() {
            woListDiv.innerHTML = '';
            woData.forEach((wo, idx) => {
                if (wo.placed) return;
                const div = document.createElement('div');
                div.className = 'wo-item';
                div.style.borderLeftColor = `hsl(${idx * 30 % 360}, 70%, 65%)`;
                div.setAttribute('draggable', 'true');
                div.dataset.woId = wo.id;
                let ngayStr = wo.ngayGiao ? wo.ngayGiao.toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit'}) : '?';
                let ghiChuStr = wo.ghiChu ? `<span class="wo-ghichu">${wo.ghiChu}</span>` : '';
                div.innerHTML = `
                    <div class="wo-code">${wo.woCode}</div>
                    <div class="wo-detail">
                        <span>${wo.tenSp}</span> <span>${wo.kichThuoc}</span> <span>SL: ${wo.soLuong}</span>
                    </div>
                    <div class="wo-giao">
                        <span>📅 Giao: ${ngayStr}</span>
                    </div>
                `;
                div.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', wo.id);
                });
                woListDiv.appendChild(div);
            });
        }

        function tinhThoiGianCan(wo) {
            let sp = wo.tenSp;
            let rate = productivityData[sp];
            if (!rate) return 4; 
            return Math.max(1, rate * wo.soLuong);
        }

        // ---------- XÂY DỰNG TIMELINE CHI TIẾT ----------
        function buildTimeline() {
            let html = '';
            // Header
            html += '<div class="days-header">';
            html += '<div class="machine-label-header" style="width:70px;"></div>';
            for (let d = 0; d < totalDays; d++) {
                let dayDate = new Date(startDate);
                dayDate.setDate(startDate.getDate() + d);
                let dateStr = dayDate.toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit' });
                let shifts = [
                    { label: 'Sáng 8h-12h', class: 'morning', hours: 4 },
                    { label: 'Chiều 13h-17h', class: 'afternoon', hours: 4 }
                ];
                if (otDays.has(d)) {
                    shifts.push({ label: 'OT 17:30-21:30', class: 'ot', hours: 4 });
                }
                html += `<div class="day-shift-group" style="display:flex;">`;
                shifts.forEach(shift => {
                    html += `<div class="shift-header" style="width:${shift.hours * pxPerHour}px;">`;
                    html += `<div class="date">${dateStr}</div>`;
                    html += `<div class="shift-label">${shift.label}</div>`;
                    html += `</div>`;
                });
                html += `</div>`;
            }
            html += '</div>';

            // Các hàng máy
            for (let m = 0; m < machines.length; m++) {
                html += `<div class="machine-row" data-machine="${m}">`;
                html += `<div class="machine-label">${machines[m]}</div>`;
                html += `<div class="machine-timeline" id="machine-${m}" style="position:relative;">`;
                for (let d = 0; d < totalDays; d++) {
                    let shifts = [
                        { type: 'morning', hours: 4 },
                        { type: 'afternoon', hours: 4 }
                    ];
                    if (otDays.has(d)) {
                        shifts.push({ type: 'ot', hours: 4 });
                    }
                    shifts.forEach(shift => {
                        html += `<div class="time-slot ${shift.type}" style="width:${shift.hours * pxPerHour}px;" data-day="${d}" data-machine="${m}" data-shift="${shift.type}"></div>`;
                    });
                }
                html += '</div></div>';
            }
            timelineGrid.innerHTML = html;

            // Vẽ lại các job
            jobs.forEach(job => drawJobBar(job));
            attachMachineDrop();
        }

        function drawJobBar(job) {
            const machineDiv = document.getElementById(`machine-${job.machineIndex}`);
            if (!machineDiv) return;
            // Kiểm tra nếu job bar đã tồn tại thì xóa cũ
            const oldBar = document.getElementById(`job-${job.id}`);
            if (oldBar) oldBar.remove();
            let bar = document.createElement('div');
            bar.className = 'job-bar';
            bar.id = `job-${job.id}`;
            bar.style.left = job.left + 'px';
            bar.style.width = job.width + 'px';
            bar.style.background = job.color;
            bar.dataset.jobId = job.id;
            bar.dataset.machine = job.machineIndex;
            // Chỉ hiển thị kích thước và số lượng
            bar.innerHTML = `
                <div class="job-size">${job.kichThuoc}</div>
                <div class="job-qty">${job.soLuong}</div>
                <div class="resize-handle"></div>
            `;
            // Sự kiện chọn job
            bar.addEventListener('click', (e) => {
                e.stopPropagation();
                if (selectedJobId) {
                    let prev = document.getElementById(`job-${selectedJobId}`);
                    if (prev) prev.classList.remove('selected');
                }
                selectedJobId = job.id;
                bar.classList.add('selected');
            });
            // Kéo di chuyển job
            bar.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('resize-handle')) return;
                e.preventDefault();
                const startX = e.clientX;
                const startLeft = job.left;
                const machineRect = machineDiv.getBoundingClientRect();
                const machineWidth = machineDiv.scrollWidth;
                function onMouseMove(e) {
                    const dx = e.clientX - startX;
                    let newLeft = startLeft + dx;
                    // Giới hạn trong máy
                    newLeft = Math.max(0, Math.min(newLeft, machineWidth - job.width));
                    // Kiểm tra xung đột với job khác cùng máy
                    let conflict = jobs.filter(j => j.id !== job.id && j.machineIndex === job.machineIndex).some(j => {
                        return (newLeft < j.left + j.width && newLeft + job.width > j.left);
                    });
                    if (!conflict) {
                        job.left = newLeft;
                        bar.style.left = newLeft + 'px';
                    }
                }
                function onMouseUp() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                }
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
            // Resize job
            let handle = bar.querySelector('.resize-handle');
            handle.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                e.preventDefault();
                const startX = e.clientX;
                const startWidth = job.width;
                const startLeft = job.left;
                const machineRect = machineDiv.getBoundingClientRect();
                const machineWidth = machineDiv.scrollWidth;
                function onMouseMove(e) {
                    const dx = e.clientX - startX;
                    let newWidth = startWidth + dx;
                    newWidth = Math.max(20, Math.min(newWidth, machineWidth - startLeft)); // không vượt quá máy
                    // Kiểm tra xung đột với job khác (bên phải)
                    let conflict = jobs.filter(j => j.id !== job.id && j.machineIndex === job.machineIndex).some(j => {
                        return (startLeft < j.left + j.width && startLeft + newWidth > j.left);
                    });
                    if (!conflict) {
                        job.width = newWidth;
                        bar.style.width = newWidth + 'px';
                    }
                }
                function onMouseUp() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                }
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
            machineDiv.appendChild(bar);
        }

        function attachMachineDrop() {
            let machineTls = document.querySelectorAll('.machine-timeline');
            machineTls.forEach(tl => {
                tl.addEventListener('dragover', (e) => e.preventDefault());
                tl.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const woId = e.dataTransfer.getData('text/plain');
                    const wo = woData.find(w => w.id === woId);
                    if (!wo || wo.placed) return;

                    let slot = e.target.closest('.time-slot');
                    if (!slot) return;
                    let machineIndex = parseInt(slot.dataset.machine);
                    let day = parseInt(slot.dataset.day);
                    let shift = slot.dataset.shift;

                    // Tính left bắt đầu của ngày
                    let leftStartOfDay = 0;
                    for (let d = 0; d < day; d++) {
                        leftStartOfDay += (8 + (otDays.has(d)?4:0)) * pxPerHour;
                    }
                    let shiftOffsets = { morning: 0, afternoon: 4 * pxPerHour, ot: 8 * pxPerHour };
                    let shiftStart = leftStartOfDay + (shiftOffsets[shift] || 0);
                    
                    let slotRect = slot.getBoundingClientRect();
                    let machineRect = tl.getBoundingClientRect();
                    let mouseX = e.clientX - machineRect.left;
                    let left = Math.min(shiftStart + slot.offsetWidth - 10, Math.max(shiftStart, mouseX - 20));

                    let gioCan = tinhThoiGianCan(wo);
                    let width = gioCan * pxPerHour;

                    // Kiểm tra xung đột
                    let conflict = jobs.filter(j => j.machineIndex === machineIndex).some(j => {
                        return (left < j.left + j.width && left + width > j.left);
                    });
                    if (conflict) {
                        alert('Khoảng thời gian này đã có việc khác!');
                        return;
                    }

                    let newJob = {
                        id: 'job_' + Math.random().toString(36).substr(2, 8),
                        woCode: wo.woCode,
                        tenSp: wo.tenSp,
                        kichThuoc: wo.kichThuoc,
                        khachHang: wo.khachHang,
                        soLuong: wo.soLuong,
                        thoiGianCan: gioCan,
                        machineIndex: machineIndex,
                        left: left,
                        width: width,
                        color: `hsl(${Math.random()*360}, 70%, 60%)`,
                    };
                    jobs.push(newJob);
                    wo.placed = true;
                    drawJobBar(newJob);
                    renderWOList();
                });
            });
        }

        function rebuildTimeline() {
            timelineGrid.innerHTML = '';
            buildTimeline();
            updateOtDaySelect();
        }

        function setTotalDays(n) {
            if (n < 1) n = 1;
            if (n > 14) n = 14;
            totalDays = n;
            rebuildTimeline();
        }

        function updateOtDaySelect() {
            let options = '';
            for (let i=0; i<totalDays; i++) {
                let d = new Date(startDate);
                d.setDate(startDate.getDate() + i);
                let label = d.toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit' });
                options += `<option value="${i}">Ngày ${i+1} (${label})</option>`;
            }
            otDaySelect.innerHTML = options;
        }

        // Thêm / bớt OT
        addOtBtn.addEventListener('click', () => {
            let day = parseInt(otDaySelect.value);
            if (otDays.has(day)) {
                alert('Ngày này đã có tăng ca');
                return;
            }
            otDays.add(day);
            rebuildTimeline();
        });

        removeOtBtn.addEventListener('click', () => {
            let day = parseInt(otDaySelect.value);
            if (!otDays.has(day)) {
                alert('Ngày này không có tăng ca');
                return;
            }
            otDays.delete(day);
            rebuildTimeline();
        });

        // Nút Cắt (chia đôi job)
        cutBtn.addEventListener('click', () => {
            if (!selectedJobId) { alert('Chọn một công việc'); return; }
            let job = jobs.find(j => j.id === selectedJobId);
            if (!job) return;
            // Chia đôi width
            let newWidth = Math.floor(job.width / 2);
            if (newWidth < 20) { alert('Quá nhỏ để chia'); return; }
            let oldWidth = job.width;
            job.width = newWidth;
            // Tạo job mới ngay sau job cũ
            let newJob = {
                ...job,
                id: 'job_' + Math.random().toString(36).substr(2, 8),
                left: job.left + newWidth,
                width: oldWidth - newWidth,
                color: `hsl(${Math.random()*360}, 70%, 60%)`,
            };
            // Kiểm tra xung đột
            let conflict = jobs.filter(j => j.machineIndex === job.machineIndex && j.id !== job.id).some(j => {
                return (newJob.left < j.left + j.width && newJob.left + newJob.width > j.left);
            });
            if (conflict) {
                alert('Không thể chia vì bị chồng lên job khác');
                job.width = oldWidth; // hoàn lại
                return;
            }
            jobs.push(newJob);
            // Cập nhật lại job cũ
            document.getElementById(`job-${job.id}`)?.remove();
            drawJobBar(job);
            drawJobBar(newJob);
            // Không thay đổi trạng thái placed của WO (vẫn giữ)
            selectedJobId = null;
        });

        // Xóa job
        deleteBtn.addEventListener('click', () => {
            if (!selectedJobId) { alert('Chọn công việc'); return; }
            let job = jobs.find(j => j.id === selectedJobId);
            if (job) {
                document.getElementById(`job-${selectedJobId}`)?.remove();
                jobs = jobs.filter(j => j.id !== selectedJobId);
                let wo = woData.find(w => w.woCode === job.woCode);
                if (wo) wo.placed = false;
                renderWOList();
                selectedJobId = null;
            }
        });

        // Xuất ảnh
        exportImgBtn.addEventListener('click', () => {
            html2canvas(document.querySelector('.workspace'), { scale: 1.2, backgroundColor: '#0f111c' }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'kehoach_sanxuat.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
            });
        });

        // Thêm/bớt ngày
        addDayBtn.addEventListener('click', () => setTotalDays(totalDays+1));
        removeDayBtn.addEventListener('click', () => setTotalDays(totalDays-1));

        // Khởi tạo
        setTotalDays(3);
    })();
</script>
</body>
</html>

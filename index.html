<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kế hoạch sản xuất theo timeline</title>
    <!-- vis-timeline stylesheet -->
    <link href="https://unpkg.com/vis-timeline@7.7.4/styles/vis-timeline-graph2d.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #1e1e1e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            background: #2d2d2d;
            padding: 12px 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            border-bottom: 1px solid #3e3e3e;
            flex-wrap: wrap;
        }

        .file-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #3e3e3e;
            padding: 6px 12px;
            border-radius: 6px;
        }

        .file-input-group label {
            font-size: 13px;
            font-weight: 500;
            color: #ccc;
        }

        .file-input-group input {
            background: transparent;
            color: #fff;
            border: none;
            font-size: 13px;
            width: 200px;
        }

        .file-input-group input::file-selector-button {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 8px;
        }

        button {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        button:hover {
            background: #0b5ed7;
        }

        button.secondary {
            background: #4a4a4a;
        }

        button.secondary:hover {
            background: #5a5a5a;
        }

        /* Dropdown tăng ca */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background: #2d2d2d;
            min-width: 200px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            border-radius: 6px;
            padding: 8px 0;
            z-index: 1000;
            top: 100%;
            left: 0;
            border: 1px solid #3e3e3e;
        }

        .dropdown-content.show {
            display: block;
        }

        .dropdown-item {
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e0e0e0;
            font-size: 13px;
        }

        .dropdown-item:hover {
            background: #3e3e3e;
        }

        .dropdown-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .dropdown-item label {
            cursor: pointer;
            flex: 1;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        .wo-pool {
            width: 300px;
            background: #252526;
            border-right: 1px solid #3e3e3e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .pool-header {
            padding: 16px;
            background: #2a2a2a;
            border-bottom: 1px solid #3e3e3e;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 14px;
        }

        .pool-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .wo-item {
            background: #2d2d2d;
            border-left: 4px solid #0d6efd;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 13px;
            cursor: grab;
            transition: 0.1s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            user-select: none;
        }

        .wo-item.assigned {
            background: #3a3a3a;
            border-left-color: #6c757d;
            opacity: 0.6;
            cursor: not-allowed;
        }

        .wo-item:hover:not(.assigned) {
            background: #3e3e3e;
            transform: translateX(2px);
        }

        .wo-item strong {
            display: block;
            font-size: 14px;
            margin-bottom: 4px;
            color: #fff;
        }

        .wo-item .details {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            color: #aaa;
        }

        .timeline-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #1e1e1e;
        }

        .timeline-header {
            padding: 12px 20px;
            background: #2a2a2a;
            border-bottom: 1px solid #3e3e3e;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #timeline {
            flex: 1;
            background: #1e1e1e;
        }

        .vis-timeline {
            border: none;
            font-family: inherit;
        }

        .vis-panel.vis-bottom {
            border-top: 1px solid #3e3e3e;
        }

        .vis-grid.vis-major {
            border-color: #3e3e3e;
        }

        .vis-grid.vis-minor {
            border-color: #2a2a2a;
        }

        .vis-item {
            border-radius: 4px;
            font-size: 12px;
            padding: 2px 8px;
            background: #0d6efd;
            border: none;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .vis-item.vis-selected {
            background: #ffc107;
            color: #000;
            border: 2px solid #fff;
        }

        .vis-item .vis-item-overflow {
            overflow: visible;
        }

        .vis-label {
            color: #e0e0e0;
            font-weight: 600;
            font-size: 14px;
            border-right: 1px solid #3e3e3e;
        }

        .vis-group {
            border-bottom: 1px solid #3e3e3e;
        }

        .vis-background {
            background: #1e1e1e;
        }

        .vis-time-axis .vis-text {
            color: #aaa;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="file-input-group">
            <label><i class="fas fa-file-excel"></i> Chọn cả 2 file:</label>
            <input type="file" id="fileInput" multiple accept=".xlsm,.xlsx">
        </div>
        <button id="processBtn"><i class="fas fa-cogs"></i> Xử lý & tạo kế hoạch</button>
        
        <!-- Dropdown tăng ca -->
        <div class="dropdown" id="overtimeDropdown">
            <button class="secondary" id="overtimeBtn"><i class="fas fa-clock"></i> Bật tăng ca</button>
            <div class="dropdown-content" id="overtimeMenu">
                <!-- sẽ được tạo động -->
            </div>
        </div>

        <div class="action-buttons">
            <button id="cutBtn" class="secondary"><i class="fas fa-cut"></i> Cắt</button>
            <button id="copyBtn" class="secondary"><i class="fas fa-copy"></i> Sao chép</button>
            <button id="pasteBtn" class="secondary"><i class="fas fa-paste"></i> Dán</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="wo-pool">
            <div class="pool-header">
                <i class="fas fa-clipboard-list"></i> Đơn hàng sản xuất
            </div>
            <div class="pool-list" id="woList"></div>
        </div>

        <div class="timeline-container">
            <div class="timeline-header">
                <span><i class="fas fa-calendar-alt"></i> 6 ngày từ hôm nay</span>
                <span style="font-size:13px; color:#aaa;">Kéo thả từ danh sách vào máy. Kéo mép để điều chỉnh thời gian.</span>
            </div>
            <div id="timeline"></div>
        </div>
    </div>

    <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/vis-timeline@7.7.4/standalone/vis-timeline-graph2d.min.js"></script>
    <script>
        (function(){
            // Dữ liệu toàn cục
            let woList = [];
            let productTimeMap = new Map();
            let assignedWO = new Set();
            let timelineItems = new vis.DataSet([]);
            let timeline = null;
            let groups = null;
            let copiedItem = null;
            let selectedOvertimeDays = []; // mảng index ngày (0-5)

            const machines = ['Máy 01', 'Máy 02', 'Máy 03', 'Máy 04', 'Máy 05', 'Máy 06', 'Máy 07', 'Máy 08'];
            const machineIds = machines.map((_, i) => i);

            const now = new Date();
            const startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
            const endDate = new Date(startDate);
            endDate.setDate(startDate.getDate() + 6);

            // Hàm parse Excel date serial
            function excelSerialToDate(serial) {
                // Excel serial: 1 = 1/1/1900; JavaScript: 1/1/1970 = 25569
                return new Date((serial - 25569) * 86400 * 1000);
            }

            // Đọc file và tự phân biệt
            async function readFiles(files) {
                let file1 = null, file2 = null;
                for (let file of files) {
                    if (file.name.includes('QUAN LY SAN XUAT 2026')) file1 = file;
                    else if (file.name.includes('NHAT KY SAN XUAT TDB')) file2 = file;
                }
                if (!file1 || !file2) {
                    throw new Error('Cần đủ 2 file: "QUAN LY SAN XUAT 2026" và "NHAT KY SAN XUAT TDB"');
                }
                const wb1 = await readFile(file1);
                const wb2 = await readFile(file2);
                return { wb1, wb2 };
            }

            function readFile(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const workbook = XLSX.read(data, { type: 'array' });
                            resolve(workbook);
                        } catch (err) {
                            reject(err);
                        }
                    };
                    reader.onerror = reject;
                    reader.readAsArrayBuffer(file);
                });
            }

            function parseFile1(workbook) {
                const sheetName = 'KHSX';
                const sheet = workbook.Sheets[sheetName];
                if (!sheet) throw new Error('Không tìm thấy sheet KHSX trong file 1');
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                const woData = [];
                for (let i = 8; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row[0] || row[0].toString().trim() === '') continue;
                    const wo = {
                        id: `wo_${i}_${Date.now()}_${Math.random()}`,
                        soWO: row[0]?.toString().trim() || '',
                        khachHang: row[3]?.toString().trim() || '',
                        tenSanPham: row[5]?.toString().trim() || '',
                        kichThuoc: row[6]?.toString().trim() || '',
                        soLuong: parseFloat(row[7]) || 0,
                        donVi: row[5]?.toString().trim() || '',
                    };
                    wo.estimatedHours = estimateHours(wo.tenSanPham, wo.soLuong);
                    woData.push(wo);
                }
                return woData;
            }

            function parseFile2(workbook) {
                const sheetName = 'NHATKY_SX';
                const sheet = workbook.Sheets[sheetName];
                if (!sheet) throw new Error('Không tìm thấy sheet NHATKY_SX trong file 2');
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                const productRecords = new Map();

                for (let i = 2; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row[1] || row[1].toString().trim() === '') continue;
                    const tenSP = row[1].toString().trim();
                    const sanLuong = parseFloat(row[8]) || 0;
                    
                    let startTime = null, endTime = null;
                    // Cột J (index 9) và K (index 10)
                    if (typeof row[9] === 'number') startTime = excelSerialToDate(row[9]);
                    else if (row[9]) startTime = new Date(row[9]);
                    
                    if (typeof row[10] === 'number') endTime = excelSerialToDate(row[10]);
                    else if (row[10]) endTime = new Date(row[10]);

                    if (!startTime || !endTime || sanLuong === 0) continue;
                    const duration = (endTime - startTime) / (1000 * 60 * 60); // giờ
                    if (duration <= 0) continue;

                    if (!productRecords.has(tenSP) || sanLuong > productRecords.get(tenSP).maxSanLuong) {
                        productRecords.set(tenSP, {
                            maxSanLuong: sanLuong,
                            durationHours: duration,
                        });
                    }
                }

                productRecords.forEach((value, key) => {
                    productTimeMap.set(key, value);
                });
            }

            function estimateHours(productName, quantity) {
                if (!productTimeMap.has(productName) || quantity === 0) return 4; // default 4h
                const rec = productTimeMap.get(productName);
                return (rec.durationHours / rec.maxSanLuong) * quantity;
            }

            function renderWOPool() {
                const container = document.getElementById('woList');
                container.innerHTML = '';
                woList.forEach(wo => {
                    const assigned = assignedWO.has(wo.id);
                    const div = document.createElement('div');
                    div.className = `wo-item ${assigned ? 'assigned' : ''}`;
                    div.setAttribute('draggable', !assigned);
                    div.dataset.woId = wo.id;
                    div.innerHTML = `
                        <strong>${wo.soWO} - ${wo.tenSanPham}</strong>
                        <div class="details">
                            <span>${wo.khachHang}</span>
                            <span>${wo.kichThuoc}</span>
                            <span>SL: ${wo.soLuong}</span>
                            <span>${wo.estimatedHours.toFixed(1)}h</span>
                        </div>
                    `;
                    div.addEventListener('dragstart', (e) => {
                        if (assigned) {
                            e.preventDefault();
                            return;
                        }
                        e.dataTransfer.setData('text/plain', wo.id);
                        e.dataTransfer.effectAllowed = 'move';
                    });
                    container.appendChild(div);
                });
            }

            function initTimeline() {
                const container = document.getElementById('timeline');
                if (timeline) timeline.destroy();

                groups = new vis.DataSet(machines.map((name, idx) => ({ id: idx, content: name })));
                timelineItems.clear();

                const options = {
                    stack: false,
                    groupOrder: 'id',
                    editable: {
                        add: false,
                        remove: true,
                        updateGroup: true,
                        updateTime: true,
                        overrideItems: true,
                    },
                    selectable: true,
                    snap: null,
                    start: startDate,
                    end: endDate,
                    min: startDate,
                    max: endDate,
                    zoomable: true,
                    moveable: true,
                    orientation: 'top',
                    horizontalScroll: true,
                    verticalScroll: true,
                    rollMode: 'both',
                    groupHeightMode: 'fixed',
                    height: '100%',
                };

                timeline = new vis.Timeline(container, timelineItems, groups, options);

                container.addEventListener('dragover', (e) => e.preventDefault());
                container.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const woId = e.dataTransfer.getData('text/plain');
                    const wo = woList.find(w => w.id === woId);
                    if (!wo || assignedWO.has(wo.id)) return;

                    const props = timeline.getEventProperties(e);
                    const group = props.group;
                    if (group === undefined) return;

                    let start = props.time;
                    if (!start) start = new Date();

                    const end = new Date(start.getTime() + wo.estimatedHours * 3600000);

                    const newItem = {
                        id: wo.id,
                        group: group,
                        start: start,
                        end: end,
                        content: `${wo.soWO} - ${wo.tenSanPham} (${wo.kichThuoc})`,
                        className: 'production-task',
                    };
                    timelineItems.add(newItem);
                    assignedWO.add(wo.id);
                    renderWOPool();
                });

                timeline.on('remove', (props) => {
                    props.items.forEach(itemId => {
                        assignedWO.delete(itemId);
                    });
                    renderWOPool();
                });
            }

            // Cập nhật background tăng ca dựa trên các ngày được chọn
            function updateOvertimeBackground() {
                // Xóa background cũ
                const backgroundItems = timelineItems.get({
                    filter: item => item.className === 'overtime-bg'
                });
                backgroundItems.forEach(item => timelineItems.remove(item.id));

                if (!selectedOvertimeDays.length) return;

                // Tạo background cho từng ngày được chọn
                selectedOvertimeDays.forEach(dayIndex => {
                    const dayStart = new Date(startDate);
                    dayStart.setDate(startDate.getDate() + dayIndex);
                    const otStart = new Date(dayStart);
                    otStart.setHours(17, 30, 0);
                    const otEnd = new Date(dayStart);
                    otEnd.setHours(21, 30, 0);

                    timelineItems.add({
                        id: `ot_bg_${dayIndex}`,
                        start: otStart,
                        end: otEnd,
                        content: '',
                        className: 'overtime-bg',
                        type: 'background',
                        style: 'background-color: rgba(255,193,7,0.15); border: none;',
                    });
                });
            }

            // Tạo menu dropdown cho tăng ca
            function populateOvertimeMenu() {
                const menu = document.getElementById('overtimeMenu');
                menu.innerHTML = '';
                for (let i = 0; i < 6; i++) {
                    const date = new Date(startDate);
                    date.setDate(startDate.getDate() + i);
                    const dateStr = date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' });
                    const dayName = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'][date.getDay()];
                    
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'dropdown-item';
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.value = i;
                    cb.id = `ot_day_${i}`;
                    cb.checked = selectedOvertimeDays.includes(i);
                    cb.addEventListener('change', (e) => {
                        const val = parseInt(e.target.value);
                        if (e.target.checked) {
                            if (!selectedOvertimeDays.includes(val)) selectedOvertimeDays.push(val);
                        } else {
                            selectedOvertimeDays = selectedOvertimeDays.filter(d => d !== val);
                        }
                        updateOvertimeBackground();
                    });
                    const label = document.createElement('label');
                    label.htmlFor = `ot_day_${i}`;
                    label.textContent = `Ngày ${dateStr} (${dayName})`;
                    
                    itemDiv.appendChild(cb);
                    itemDiv.appendChild(label);
                    menu.appendChild(itemDiv);
                }
            }

            // Xử lý dropdown hiện/ẩn
            document.getElementById('overtimeBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                const menu = document.getElementById('overtimeMenu');
                menu.classList.toggle('show');
            });

            // Click ngoài dropdown thì đóng
            window.addEventListener('click', () => {
                document.getElementById('overtimeMenu').classList.remove('show');
            });

            // Cut, copy, paste
            function cutSelected() {
                const selection = timeline.getSelection();
                if (selection && selection.items && selection.items.length) {
                    const itemId = selection.items[0];
                    const item = timelineItems.get(itemId);
                    if (item) {
                        copiedItem = { ...item };
                        timelineItems.remove(itemId);
                        assignedWO.delete(itemId);
                        renderWOPool();
                    }
                }
            }

            function copySelected() {
                const selection = timeline.getSelection();
                if (selection && selection.items && selection.items.length) {
                    const itemId = selection.items[0];
                    const item = timelineItems.get(itemId);
                    if (item) {
                        copiedItem = { ...item };
                    }
                }
            }

            function pasteItem() {
                if (!copiedItem) return;
                const newStart = new Date(copiedItem.end.getTime() + 3600000);
                const newEnd = new Date(newStart.getTime() + (copiedItem.end - copiedItem.start));
                const newId = `wo_copy_${Date.now()}_${Math.random()}`;
                const newItem = {
                    ...copiedItem,
                    id: newId,
                    start: newStart,
                    end: newEnd,
                };
                timelineItems.add(newItem);
                // Không thêm vào assignedWO vì không phải WO gốc
            }

            // Xử lý nút Process
            document.getElementById('processBtn').addEventListener('click', async () => {
                const fileInput = document.getElementById('fileInput');
                if (!fileInput.files || fileInput.files.length < 2) {
                    alert('Vui lòng chọn 2 file!');
                    return;
                }

                try {
                    const { wb1, wb2 } = await readFiles(fileInput.files);
                    productTimeMap.clear(); // reset
                    parseFile2(wb2);
                    woList = parseFile1(wb1);
                    
                    assignedWO.clear();
                    timelineItems.clear();
                    renderWOPool();

                    // Reset overtime selection
                    selectedOvertimeDays = [];
                    updateOvertimeBackground();
                    populateOvertimeMenu(); // cập nhật checkbox
                } catch (err) {
                    console.error(err);
                    alert('Lỗi: ' + err.message);
                }
            });

            // Khởi tạo timeline và menu khi trang load
            window.addEventListener('load', () => {
                initTimeline();
                populateOvertimeMenu();

                document.getElementById('cutBtn').addEventListener('click', cutSelected);
                document.getElementById('copyBtn').addEventListener('click', copySelected);
                document.getElementById('pasteBtn').addEventListener('click', pasteItem);
            });

        })();
    </script>
</body>
</html>

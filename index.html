<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kế hoạch sản xuất theo timeline</title>
    <!-- vis-timeline stylesheet -->
    <link href="https://unpkg.com/vis-timeline@7.7.4/styles/vis-timeline-graph2d.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #1e1e1e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Thanh công cụ trên cùng */
        .toolbar {
            background: #2d2d2d;
            padding: 12px 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            border-bottom: 1px solid #3e3e3e;
            flex-wrap: wrap;
        }

        .file-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #3e3e3e;
            padding: 6px 12px;
            border-radius: 6px;
        }

        .file-input-group label {
            font-size: 13px;
            font-weight: 500;
            color: #ccc;
        }

        .file-input-group input {
            background: transparent;
            color: #fff;
            border: none;
            font-size: 13px;
            width: 200px;
        }

        .file-input-group input::file-selector-button {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 8px;
        }

        button {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        button:hover {
            background: #0b5ed7;
        }

        button.secondary {
            background: #4a4a4a;
        }

        button.secondary:hover {
            background: #5a5a5a;
        }

        /* Khu vực chính: pool đơn hàng (trái) + timeline (phải) */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        /* Pool đơn hàng chưa gán */
        .wo-pool {
            width: 300px;
            background: #252526;
            border-right: 1px solid #3e3e3e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .pool-header {
            padding: 16px;
            background: #2a2a2a;
            border-bottom: 1px solid #3e3e3e;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 14px;
        }

        .pool-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .wo-item {
            background: #2d2d2d;
            border-left: 4px solid #0d6efd;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 13px;
            cursor: grab;
            transition: 0.1s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            user-select: none;
        }

        .wo-item.assigned {
            background: #3a3a3a;
            border-left-color: #6c757d;
            opacity: 0.6;
            cursor: not-allowed;
        }

        .wo-item:hover:not(.assigned) {
            background: #3e3e3e;
            transform: translateX(2px);
        }

        .wo-item strong {
            display: block;
            font-size: 14px;
            margin-bottom: 4px;
            color: #fff;
        }

        .wo-item .details {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            color: #aaa;
        }

        /* Timeline container */
        .timeline-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #1e1e1e;
        }

        .timeline-header {
            padding: 12px 20px;
            background: #2a2a2a;
            border-bottom: 1px solid #3e3e3e;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        #timeline {
            flex: 1;
            background: #1e1e1e;
        }

        /* Tùy chỉnh giao diện vis-timeline */
        .vis-timeline {
            border: none;
            font-family: inherit;
        }

        .vis-panel.vis-bottom {
            border-top: 1px solid #3e3e3e;
        }

        .vis-grid.vis-major {
            border-color: #3e3e3e;
        }

        .vis-grid.vis-minor {
            border-color: #2a2a2a;
        }

        .vis-item {
            border-radius: 4px;
            font-size: 12px;
            padding: 2px 8px;
            background: #0d6efd;
            border: none;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .vis-item.vis-selected {
            background: #ffc107;
            color: #000;
            border: 2px solid #fff;
        }

        .vis-item .vis-item-overflow {
            overflow: visible;
        }

        .vis-label {
            color: #e0e0e0;
            font-weight: 600;
            font-size: 14px;
            border-right: 1px solid #3e3e3e;
        }

        .vis-group {
            border-bottom: 1px solid #3e3e3e;
        }

        .vis-background {
            background: #1e1e1e;
        }

        .vis-time-axis .vis-text {
            color: #aaa;
        }

        /* Dropdown tăng ca */
        .overtime-dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #2d2d2d;
            min-width: 200px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            border-radius: 6px;
            padding: 12px;
            z-index: 1000;
            border: 1px solid #3e3e3e;
        }

        .dropdown-content.show {
            display: block;
        }

        .day-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            color: #e0e0e0;
        }

        .day-checkbox input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .day-checkbox label {
            cursor: pointer;
            flex: 1;
        }

        .dropdown-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 12px;
            border-top: 1px solid #3e3e3e;
            padding-top: 12px;
        }

        .dropdown-footer button {
            padding: 4px 12px;
            font-size: 12px;
        }

        /* Nút điều khiển nhỏ */
        .action-buttons {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="file-input-group">
            <label><i class="fas fa-file-excel"></i> File QLSX 2026:</label>
            <input type="file" id="file1" accept=".xlsm,.xlsx">
        </div>
        <div class="file-input-group">
            <label><i class="fas fa-file-excel"></i> File NK SX TDB:</label>
            <input type="file" id="file2" accept=".xlsm,.xlsx">
        </div>
        <button id="processBtn"><i class="fas fa-cogs"></i> Xử lý & tạo kế hoạch</button>
        
        <!-- Dropdown tăng ca -->
        <div class="overtime-dropdown">
            <button id="overtimeBtn" class="secondary"><i class="fas fa-clock"></i> Chọn ngày tăng ca ▼</button>
            <div id="overtimeDropdown" class="dropdown-content">
                <div id="overtimeDays"></div>
                <div class="dropdown-footer">
                    <button id="applyOvertime" class="secondary">Áp dụng</button>
                    <button id="closeDropdown">Đóng</button>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button id="cutBtn" class="secondary"><i class="fas fa-cut"></i> Cắt</button>
            <button id="copyBtn" class="secondary"><i class="fas fa-copy"></i> Sao chép</button>
            <button id="pasteBtn" class="secondary"><i class="fas fa-paste"></i> Dán</button>
        </div>
    </div>

    <div class="main-layout">
        <!-- Pool đơn hàng chưa gán / đã gán -->
        <div class="wo-pool">
            <div class="pool-header">
                <i class="fas fa-clipboard-list"></i> Đơn hàng sản xuất
            </div>
            <div class="pool-list" id="woList"></div>
        </div>

        <!-- Khu vực timeline -->
        <div class="timeline-container">
            <div class="timeline-header">
                <span><i class="fas fa-calendar-alt"></i> 6 ngày từ hôm nay</span>
                <span style="font-size:13px; color:#aaa;">Kéo thả từ danh sách vào máy. Kéo mép để điều chỉnh thời gian.</span>
            </div>
            <div id="timeline"></div>
        </div>
    </div>

    <!-- Thư viện hỗ trợ -->
    <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/vis-timeline@7.7.4/standalone/vis-timeline-graph2d.min.js"></script>
    <script>
        (function(){
            // ---------- DỮ LIỆU TOÀN CỤC ----------
            let woList = [];                // danh sách đơn hàng từ file1
            let productTimeMap = new Map(); // Map<tên sản phẩm, {durationHours, maxSanLuong}>
            let assignedWO = new Set();      // tập các WO id đã được đưa lên timeline
            let timelineItems = new vis.DataSet([]);
            let timeline = null;
            let groups = null;
            let copiedItem = null;           // lưu item sao chép
            let selectedOvertimeDays = [];    // mảng index ngày được chọn (0-5)

            // Cấu hình máy (01-08)
            const machines = [
                'Máy 01', 'Máy 02', 'Máy 03', 'Máy 04',
                'Máy 05', 'Máy 06', 'Máy 07', 'Máy 08'
            ];
            const machineIds = machines.map((_, i) => i);

            // Khoảng thời gian 6 ngày từ hôm nay (bắt đầu từ 00:00 hôm nay)
            const now = new Date();
            const startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
            const endDate = new Date(startDate);
            endDate.setDate(startDate.getDate() + 6); // 6 ngày sau, lấy đến cuối ngày

            // ---------- HÀM ĐỌC EXCEL VÀ XỬ LÝ ----------
            function readFile(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const workbook = XLSX.read(data, { type: 'array' });
                            resolve(workbook);
                        } catch (err) {
                            reject(err);
                        }
                    };
                    reader.onerror = reject;
                    reader.readAsArrayBuffer(file);
                });
            }

            // Chuyển đổi Excel date serial thành Date object
            function excelSerialToDate(serial) {
                if (typeof serial !== 'number') return null;
                // Excel ngày 1/1/1900 = 1, JavaScript ngày 1/1/1970 = 0
                // (serial - 25569) là số ngày từ 1/1/1970
                const utcDays = serial - 25569;
                const utcMs = utcDays * 86400 * 1000;
                return new Date(utcMs);
            }

            // Parse giá trị ô Excel có thể là số hoặc chuỗi
            function parseExcelDate(value) {
                if (!value) return null;
                if (typeof value === 'number') {
                    return excelSerialToDate(value);
                }
                if (typeof value === 'string') {
                    // Thử parse chuỗi
                    const d = new Date(value);
                    if (!isNaN(d)) return d;
                    // Xử lý định dạng dd/mm/yyyy
                    const parts = value.split(/[\/\-]/);
                    if (parts.length === 3) {
                        const day = parseInt(parts[0], 10);
                        const month = parseInt(parts[1], 10) - 1;
                        const year = parseInt(parts[2], 10);
                        return new Date(year, month, day);
                    }
                }
                return null;
            }

            function parseFile1(workbook) {
                const sheetName = 'KHSX';
                const sheet = workbook.Sheets[sheetName];
                if (!sheet) {
                    alert('Không tìm thấy sheet KHSX trong file 1!');
                    return [];
                }
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                // Bắt đầu từ dòng 9 (index 8)
                const woData = [];
                for (let i = 8; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row[0] || row[0].toString().trim() === '') continue; // bỏ dòng trống
                    const wo = {
                        id: `wo_${i}_${Date.now()}_${Math.random()}`, // unique id
                        soWO: row[0]?.toString().trim() || '',
                        khachHang: row[3]?.toString().trim() || '',
                        tenSanPham: row[5]?.toString().trim() || '',
                        kichThuoc: row[6]?.toString().trim() || '',
                        soLuong: parseFloat(row[7]) || 0,
                        donVi: row[5]?.toString().trim() || '', // tạm lấy cột F làm đơn vị
                    };
                    // Tính thời gian dự kiến dựa trên file2
                    wo.estimatedHours = estimateHours(wo.tenSanPham, wo.soLuong);
                    woData.push(wo);
                }
                return woData;
            }

            function parseFile2(workbook) {
                const sheetName = 'NHATKY_SX';
                const sheet = workbook.Sheets[sheetName];
                if (!sheet) {
                    alert('Không tìm thấy sheet NHATKY_SX trong file 2!');
                    return;
                }
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                // Bắt đầu từ dòng 3 (index 2)
                const productRecords = new Map(); // tạm lưu để tìm max sản lượng
                for (let i = 2; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row[1] || row[1].toString().trim() === '') continue;
                    const tenSP = row[1]?.toString().trim();
                    const sanLuong = parseFloat(row[8]) || 0;
                    const startTime = parseExcelDate(row[9]);
                    const endTime = parseExcelDate(row[10]);
                    if (!startTime || !endTime || sanLuong === 0) continue;
                    const duration = (endTime - startTime) / (1000 * 60 * 60); // giờ
                    if (duration <= 0) continue;

                    if (!productRecords.has(tenSP) || sanLuong > productRecords.get(tenSP).maxSanLuong) {
                        productRecords.set(tenSP, {
                            maxSanLuong: sanLuong,
                            durationHours: duration,
                        });
                    }
                }
                // Chuyển vào Map chính
                productRecords.forEach((value, key) => {
                    productTimeMap.set(key, value);
                });
                console.log('Product time map:', productTimeMap);
            }

            function estimateHours(productName, quantity) {
                if (!productTimeMap.has(productName) || quantity === 0) return 4; // mặc định 4h (1 session)
                const rec = productTimeMap.get(productName);
                // Thời gian = (duration / maxSL) * quantity
                return (rec.durationHours / rec.maxSanLuong) * quantity;
            }

            // Hiển thị danh sách WO trong pool
            function renderWOPool() {
                const container = document.getElementById('woList');
                container.innerHTML = '';
                woList.forEach(wo => {
                    const assigned = assignedWO.has(wo.id);
                    const div = document.createElement('div');
                    div.className = `wo-item ${assigned ? 'assigned' : ''}`;
                    div.setAttribute('draggable', !assigned);
                    div.dataset.woId = wo.id;
                    div.innerHTML = `
                        <strong>${wo.soWO} - ${wo.tenSanPham}</strong>
                        <div class="details">
                            <span>${wo.khachHang}</span>
                            <span>${wo.kichThuoc}</span>
                            <span>SL: ${wo.soLuong}</span>
                            <span>${wo.estimatedHours.toFixed(1)}h</span>
                        </div>
                    `;
                    // Kéo thả
                    div.addEventListener('dragstart', (e) => {
                        if (assigned) {
                            e.preventDefault();
                            return;
                        }
                        e.dataTransfer.setData('text/plain', wo.id);
                        e.dataTransfer.effectAllowed = 'move';
                    });
                    container.appendChild(div);
                });
            }

            // Khởi tạo timeline
            function initTimeline() {
                const container = document.getElementById('timeline');
                if (timeline) timeline.destroy();

                // Groups: các máy
                groups = new vis.DataSet(machines.map((name, idx) => ({
                    id: idx,
                    content: name,
                })));

                // Items: ban đầu rỗng
                timelineItems.clear();

                const options = {
                    stack: false,
                    groupOrder: 'id',
                    editable: {
                        add: false,
                        remove: true,
                        updateGroup: true,
                        updateTime: true,
                        overrideItems: true,
                    },
                    selectable: true,
                    snap: null,
                    start: startDate,
                    end: endDate,
                    min: startDate,
                    max: endDate,
                    zoomable: true,
                    moveable: true,
                    orientation: 'top',
                    horizontalScroll: true,
                    verticalScroll: true,
                    rollMode: 'both',
                    groupHeightMode: 'fixed',
                    height: '100%',
                };

                timeline = new vis.Timeline(container, timelineItems, groups, options);

                // Xử lý drop từ pool vào timeline
                container.addEventListener('dragover', (e) => e.preventDefault());
                container.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const woId = e.dataTransfer.getData('text/plain');
                    const wo = woList.find(w => w.id === woId);
                    if (!wo || assignedWO.has(wo.id)) return;

                    // Lấy vị trí thả
                    const props = timeline.getEventProperties(e);
                    const group = props.group; // group id (0-7)
                    if (group === undefined) return; // thả ngoài vùng máy

                    // Thời gian thả (là thời điểm chuột)
                    let start = props.time;
                    if (!start) start = new Date(); // fallback

                    const end = new Date(start.getTime() + wo.estimatedHours * 3600000);

                    // Tạo item mới
                    const newItem = {
                        id: wo.id,
                        group: group,
                        start: start,
                        end: end,
                        content: `${wo.soWO} - ${wo.tenSanPham} (${wo.kichThuoc})`,
                        className: 'production-task',
                    };
                    timelineItems.add(newItem);
                    assignedWO.add(wo.id);
                    renderWOPool();
                });

                // Lắng nghe sự kiện khi item bị xóa (ví dụ nhấn Delete hoặc dùng nút Cut)
                timeline.on('remove', (props) => {
                    props.items.forEach(itemId => {
                        assignedWO.delete(itemId);
                    });
                    renderWOPool();
                });

                // Khi item thay đổi (move, resize) - có thể cập nhật nếu cần
            }

            // Tạo dropdown các ngày để chọn tăng ca
            function renderOvertimeDays() {
                const container = document.getElementById('overtimeDays');
                container.innerHTML = '';
                for (let i = 0; i < 6; i++) {
                    const day = new Date(startDate);
                    day.setDate(startDate.getDate() + i);
                    const dateStr = day.toLocaleDateString('vi-VN', { weekday: 'short', day: '2-digit', month: '2-digit' });
                    const checked = selectedOvertimeDays.includes(i) ? 'checked' : '';
                    const div = document.createElement('div');
                    div.className = 'day-checkbox';
                    div.innerHTML = `
                        <input type="checkbox" id="ot_day_${i}" value="${i}" ${checked}>
                        <label for="ot_day_${i}">${dateStr}</label>
                    `;
                    container.appendChild(div);
                }
            }

            // Áp dụng tăng ca cho các ngày được chọn
            function applyOvertime() {
                // Lấy các checkbox được chọn
                const checkboxes = document.querySelectorAll('#overtimeDays input[type="checkbox"]:checked');
                selectedOvertimeDays = Array.from(checkboxes).map(cb => parseInt(cb.value, 10));
                
                // Xóa các background items cũ
                const backgroundItems = timelineItems.get({
                    filter: item => item.className === 'overtime-bg'
                });
                backgroundItems.forEach(item => timelineItems.remove(item.id));

                // Thêm background cho mỗi ngày được chọn
                selectedOvertimeDays.forEach(dayIndex => {
                    const dayStart = new Date(startDate);
                    dayStart.setDate(startDate.getDate() + dayIndex);
                    const otStart = new Date(dayStart);
                    otStart.setHours(17, 30, 0);
                    const otEnd = new Date(dayStart);
                    otEnd.setHours(21, 30, 0);

                    timelineItems.add({
                        id: `ot_bg_${dayIndex}`,
                        start: otStart,
                        end: otEnd,
                        content: '',
                        className: 'overtime-bg',
                        type: 'background',
                        style: 'background-color: rgba(255,193,7,0.15); border: none;',
                    });
                });

                // Đóng dropdown
                document.getElementById('overtimeDropdown').classList.remove('show');
            }

            // Xử lý nút Cut
            function cutSelected() {
                const selection = timeline.getSelection();
                if (selection && selection.items && selection.items.length > 0) {
                    const itemId = selection.items[0];
                    const item = timelineItems.get(itemId);
                    if (item) {
                        copiedItem = { ...item }; // sao chép để paste
                        timelineItems.remove(itemId);
                        assignedWO.delete(itemId);
                        renderWOPool();
                    }
                }
            }

            // Copy
            function copySelected() {
                const selection = timeline.getSelection();
                if (selection && selection.items && selection.items.length > 0) {
                    const itemId = selection.items[0];
                    const item = timelineItems.get(itemId);
                    if (item) {
                        copiedItem = { ...item };
                    }
                }
            }

            // Paste: tạo mới với id mới, cùng group, bắt đầu sau item cũ 1 giờ
            function pasteItem() {
                if (!copiedItem) return;
                const newStart = new Date(copiedItem.end.getTime() + 3600000); // +1h
                const newEnd = new Date(newStart.getTime() + (copiedItem.end - copiedItem.start));

                const newId = `wo_copy_${Date.now()}_${Math.random()}`;
                const newItem = {
                    ...copiedItem,
                    id: newId,
                    start: newStart,
                    end: newEnd,
                };
                timelineItems.add(newItem);
                // Không đánh dấu assignedWO vì đây là bản sao
            }

            // Xử lý nút Process
            document.getElementById('processBtn').addEventListener('click', async () => {
                const file1Input = document.getElementById('file1');
                const file2Input = document.getElementById('file2');
                const file1 = file1Input.files[0];
                const file2 = file2Input.files[0];
                
                if (!file1 || !file2) {
                    alert('Vui lòng chọn cả 2 file!');
                    return;
                }

                // Tự động phân biệt file theo tên (nếu cần, nhưng không bắt buộc)
                // Ở đây chúng ta dùng file1 và file2 theo thứ tự người dùng chọn
                // Nhưng có thể kiểm tra tên để chắc chắn
                if (!file1.name.includes('QUAN LY SAN XUAT') && !file1.name.includes('2026')) {
                    console.warn('File 1 có thể không đúng: ', file1.name);
                }
                if (!file2.name.includes('NHAT KY SAN XUAT') && !file2.name.includes('TDB')) {
                    console.warn('File 2 có thể không đúng: ', file2.name);
                }

                try {
                    // Đọc file2 trước để có map thời gian
                    const wb2 = await readFile(file2);
                    parseFile2(wb2);

                    const wb1 = await readFile(file1);
                    woList = parseFile1(wb1);

                    // Reset assigned
                    assignedWO.clear();
                    // Xóa hết item trong timeline
                    timelineItems.clear();
                    // Render pool
                    renderWOPool();

                    alert('Đã xử lý thành công! Có ' + woList.length + ' đơn hàng.');
                } catch (err) {
                    console.error(err);
                    alert('Lỗi xử lý file: ' + err.message);
                }
            });

            // Khởi tạo timeline và các sự kiện khi trang load
            window.addEventListener('load', () => {
                initTimeline();
                renderOvertimeDays();

                // Gắn sự kiện cho các nút
                document.getElementById('cutBtn').addEventListener('click', cutSelected);
                document.getElementById('copyBtn').addEventListener('click', copySelected);
                document.getElementById('pasteBtn').addEventListener('click', pasteItem);

                // Dropdown tăng ca
                const overtimeBtn = document.getElementById('overtimeBtn');
                const dropdown = document.getElementById('overtimeDropdown');
                overtimeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    dropdown.classList.toggle('show');
                });

                document.getElementById('applyOvertime').addEventListener('click', applyOvertime);
                document.getElementById('closeDropdown').addEventListener('click', () => {
                    dropdown.classList.remove('show');
                });

                // Đóng dropdown khi click ra ngoài
                window.addEventListener('click', (e) => {
                    if (!overtimeBtn.contains(e.target) && !dropdown.contains(e.target)) {
                        dropdown.classList.remove('show');
                    }
                });
            });

        })();
    </script>
</body>
</html>
